<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Ocean Depth Gradient -->
    <radialGradient id="oceanDepth" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e2842"/>
      <stop offset="60%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#070b14"/>
    </radialGradient>
    
    <!-- Bioluminescent Glow -->
    <radialGradient id="tentacleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#00d4aa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Eye Glow -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="30%" stop-color="#67e8f9" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Body Gradient -->
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
    
    <!-- Filter for Glow Effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <!-- Stronger Glow for Eyes -->
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <!-- Noise Texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
    </filter>
    
    <!-- Clip Path for Circular Avatar -->
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="250"/>
    </clipPath>
    
    <!-- Animation for tentacles -->
    <style>
      @keyframes wave {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(3deg); }
        75% { transform: rotate(-3deg); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      
      @keyframes drift {
        0% { transform: translate(0, 0); }
        25% { transform: translate(5px, -5px); }
        50% { transform: translate(0, -10px); }
        75% { transform: translate(-5px, -5px); }
        100% { transform: translate(0, 0); }
      }
      
      .tentacle { transform-origin: center bottom; animation: wave 4s ease-in-out infinite; }
      .tentacle:nth-child(1) { animation-delay: 0s; }
      .tentacle:nth-child(2) { animation-delay: 0.3s; }
      .tentacle:nth-child(3) { animation-delay: 0.6s; }
      .tentacle:nth-child(4) { animation-delay: 0.9s; }
      .tentacle:nth-child(5) { animation-delay: 1.2s; }
      .tentacle:nth-child(6) { animation-delay: 1.5s; }
      .tentacle:nth-child(7) { animation-delay: 1.8s; }
      .tentacle:nth-child(8) { animation-delay: 2.1s; }
      
      .eye-glow { animation: pulse 3s ease-in-out infinite; }
      .particle { animation: drift 15s ease-in-out infinite; }
      .head { animation: float 6s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="250" fill="url(#oceanDepth)"/>
  
  <!-- Noise Texture Overlay -->
  <rect x="0" y="0" width="512" height="512" fill="#000" filter="url(#noise)" opacity="0.4"/>
  
  <g clip-path="url(#circleClip)">
    <!-- Floating Particles (Bioluminescent Plankton) -->
    <g opacity="0.6">
      <circle class="particle" cx="80" cy="120" r="2" fill="#67e8f9" style="animation-delay: 0s"/>
      <circle class="particle" cx="420" cy="80" r="1.5" fill="#00d4aa" style="animation-delay: 2s"/>
      <circle class="particle" cx="150" cy="400" r="2.5" fill="#67e8f9" style="animation-delay: 4s"/>
      <circle class="particle" cx="400" cy="350" r="1.8" fill="#0891b2" style="animation-delay: 1s"/>
      <circle class="particle" cx="60" cy="280" r="1.5" fill="#00d4aa" style="animation-delay: 3s"/>
      <circle class="particle" cx="450" cy="200" r="2" fill="#67e8f9" style="animation-delay: 5s"/>
      <circle class="particle" cx="100" cy="50" r="1.2" fill="#0891b2" style="animation-delay: 6s"/>
      <circle class="particle" cx="380" cy="450" r="1.8" fill="#00d4aa" style="animation-delay: 2.5s"/>
    </g>
    
    <!-- Tentacles Layer (Back) -->
    <g opacity="0.7">
      <!-- Left Back Tentacles -->
      <path class="tentacle" d="M200 320 Q160 380 140 460" stroke="url(#tentacleGlow)" stroke-width="12" fill="none" stroke-linecap="round"/>
      <path class="tentacle" d="M220 330 Q190 390 180 470" stroke="url(#tentacleGlow)" stroke-width="10" fill="none" stroke-linecap="round"/>
      
      <!-- Right Back Tentacles -->
      <path class="tentacle" d="M312 320 Q352 380 372 460" stroke="url(#tentacleGlow)" stroke-width="12" fill="none" stroke-linecap="round"/>
      <path class="tentacle" d="M292 330 Q322 390 332 470" stroke="url(#tentacleGlow)" stroke-width="10" fill="none" stroke-linecap="round"/>
    </g>
    
    <!-- Tentacles Layer (Front) -->
    <g opacity="0.9">
      <!-- Far Left -->
      <path class="tentacle" d="M180 310 Q120 360 100 440" stroke="url(#tentacleGlow)" stroke-width="14" fill="none" stroke-linecap="round" filter="url(#glow)"/>
      
      <!-- Mid Left -->
      <path class="tentacle" d="M210 320 Q170 380 150 480" stroke="url(#tentacleGlow)" stroke-width="11" fill="none" stroke-linecap="round"/>
      
      <!-- Mid Right -->
      <path class="tentacle" d="M302 320 Q342 380 362 480" stroke="url(#tentacleGlow)" stroke-width="11" fill="none" stroke-linecap="round"/>
      
      <!-- Far Right -->
      <path class="tentacle" d="M332 310 Q392 360 412 440" stroke="url(#tentacleGlow)" stroke-width="14" fill="none" stroke-linecap="round" filter="url(#glow)"/>
    </g>
    
    <!-- Head/Body -->
    <g class="head">
      <!-- Main Head Shape -->
      <ellipse cx="256" cy="240" rx="85" ry="95" fill="url(#bodyGradient)"/>
      
      <!-- Head Glow -->
      <ellipse cx="256" cy="240" rx="85" ry="95" fill="url(#tentacleGlow)" opacity="0.3"/>
      
      <!-- Eyes Container -->
      <g filter="url(#strongGlow)">
        <!-- Left Eye -->
        <ellipse cx="220" cy="230" rx="28" ry="35" fill="#0a0f1a"/>
        <ellipse class="eye-glow" cx="220" cy="230" rx="20" ry="25" fill="url(#eyeGlow)"/>
        <circle cx="225" cy="225" r="8" fill="#ffffff" opacity="0.9"/>
        
        <!-- Right Eye -->
        <ellipse cx="292" cy="230" rx="28" ry="35" fill="#0a0f1a"/>
        <ellipse class="eye-glow" cx="292" cy="230" rx="20" ry="25" fill="url(#eyeGlow)"/>
        <circle cx="297" cy="225" r="8" fill="#ffffff" opacity="0.9"/>
      </g>
      
      <!-- Subtle Mouth (Mysterious Smile) -->
      <path d="M236 285 Q256 295 276 285" stroke="#0a0f1a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
      
      <!-- Suckers on Tentacles (Decorative) -->
      <circle cx="165" cy="380" r="4" fill="#0891b2" opacity="0.5"/>
      <circle cx="160" cy="405" r="3.5" fill="#0891b2" opacity="0.4"/>
      <circle cx="155" cy="428" r="3" fill="#0891b2" opacity="0.3"/>
      
      <circle cx="347" cy="380" r="4" fill="#0891b2" opacity="0.5"/>
      <circle cx="352" cy="405" r="3.5" fill="#0891b2" opacity="0.4"/>
      <circle cx="357" cy="428" r="3" fill="#0891b2" opacity="0.3"/>
    </g>
    
    <!-- Extra Glow Particles Around Head -->
    <g opacity="0.5">
      <circle cx="180" cy="180" r="3" fill="#67e8f9">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="340" cy="160" r="2.5" fill="#00d4aa">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="150" cy="260" r="2" fill="#67e8f9">
        <animate attributeName="opacity" values="0.4;0.9;0.4" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="370" cy="280" r="3" fill="#0891b2">
        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4.5s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
  
  <!-- Outer Ring Glow -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#00d4aa" stroke-width="2" opacity="0.3" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="250" fill="none" stroke="#0891b2" stroke-width="1" opacity="0.2"/>
</svg>