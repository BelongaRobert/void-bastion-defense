<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Bastion Defense</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #game-canvas {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f23 100%);
            border: 2px solid #ff4400;
            box-shadow: 0 0 30px rgba(255, 68, 0, 0.3);
            max-width: 100%;
            max-height: 100%;
        }

        .loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .logo {
            font-size: 3em;
            font-weight: bold;
            color: #ff4400;
            text-shadow: 0 0 20px rgba(255, 68, 0, 0.5);
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.2em;
            color: #888;
            margin-bottom: 30px;
        }

        .loading-bar {
            width: 300px;
            height: 4px;
            background: #1a1a2e;
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff4400, #ff6600);
            transition: width 0.3s ease;
        }

        .loading-text {
            margin-top: 15px;
            color: #666;
            font-size: 0.9em;
        }

        .game-placeholder {
            text-align: center;
            padding: 40px;
        }

        .game-placeholder h1 {
            color: #ff4400;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .game-placeholder p {
            color: #888;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .control-item {
            background: rgba(255, 68, 0, 0.1);
            border: 1px solid rgba(255, 68, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            text-align: left;
        }

        .control-key {
            color: #ff4400;
            font-weight: bold;
            margin-right: 10px;
        }

        .status-bar {
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 5px;
            font-size: 0.8em;
            color: #666;
        }

        .steam-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .steam-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
        }

        .steam-indicator.connected {
            background: #4caf50;
            box-shadow: 0 0 5px #4caf50;
        }

        .steam-indicator.disconnected {
            background: #f44336;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="logo">⚔️ VOID BASTION</div>
        <div class="subtitle">DEFENSE</div>
        <div class="loading-bar">
            <div id="loading-bar-fill" class="loading-bar-fill"></div>
        </div>
        <div id="loading-text" class="loading-text">Initializing battle systems...</div>
    </div>

    <!-- Game Container -->
    <div id="game-container">
        <div class="game-placeholder" id="game-content">
            <h1>🐙 Void Bastion Defense</h1>
            <p>The Emperor protects! Your HTML5 game will be integrated here.</p>
            <p style="color: #ff4400; font-size: 0.9em;">Replace this content with your game files</p>
            
            <div class="controls">
                <div class="control-item">
                    <span class="control-key">WASD / ↑↓←→</span>Move
                </div>
                <div class="control-item">
                    <span class="control-key">SPACE</span>Action/Build
                </div>
                <div class="control-item">
                    <span class="control-key">ESC</span>Pause/Menu
                </div>
                <div class="control-item">
                    <span class="control-key">F11</span>Fullscreen
                </div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="steam-status">
            <span class="steam-indicator" id="steam-indicator"></span>
            <span id="steam-text">Steam: Disconnected</span>
        </div>
        <div>v1.0.0 | Electron</div>
    </div>

    <script>
        // Game initialization
        (function() {
            console.log('[Void Bastion] Game initializing...');

            // Loading screen animation
            const loadingBar = document.getElementById('loading-bar-fill');
            const loadingText = document.getElementById('loading-text');
            const loadingScreen = document.getElementById('loading-screen');

            const loadingSteps = [
                { progress: 20, text: 'Loading assets...' },
                { progress: 40, text: 'Initializing renderer...' },
                { progress: 60, text: 'Connecting to Steam...' },
                { progress: 80, text: 'Preparing battle systems...' },
                { progress: 100, text: 'Ready to deploy!' }
            ];

            let stepIndex = 0;
            const loadInterval = setInterval(() => {
                if (stepIndex < loadingSteps.length) {
                    loadingBar.style.width = loadingSteps[stepIndex].progress + '%';
                    loadingText.textContent = loadingSteps[stepIndex].text;
                    stepIndex++;
                } else {
                    clearInterval(loadInterval);
                    setTimeout(() => {
                        loadingScreen.classList.add('hidden');
                        initGame();
                    }, 500);
                }
            }, 400);

            // Initialize game systems
            function initGame() {
                console.log('[Void Bastion] Game systems ready');
                
                // Check for Electron API
                if (window.electronAPI) {
                    console.log('[Void Bastion] Electron API detected');
                    setupElectronIntegration();
                } else {
                    console.log('[Void Bastion] Running in browser mode');
                }

                // Keyboard controls
                setupControls();
            }

            // Electron integration
            function setupElectronIntegration() {
                // Check Steam status
                window.electronAPI.getSteamInfo().then(info => {
                    const indicator = document.getElementById('steam-indicator');
                    const text = document.getElementById('steam-text');
                    
                    if (info.initialized) {
                        indicator.classList.add('connected');
                        text.textContent = 'Steam: Connected';
                    } else {
                        indicator.classList.add('disconnected');
                        text.textContent = 'Steam: Offline';
                    }
                });

                // Listen for menu actions
                window.electronAPI.onMenuAction((action) => {
                    console.log('[Void Bastion] Menu action:', action);
                    handleMenuAction(action);
                });

                // Listen for fullscreen changes
                window.electronAPI.onFullscreenChange((isFullscreen) => {
                    console.log('[Void Bastion] Fullscreen:', isFullscreen);
                });

                // Listen for achievements
                window.electronAPI.onAchievementUnlocked((achievementId) => {
                    console.log('[Void Bastion] Achievement unlocked:', achievementId);
                    showAchievementNotification(achievementId);
                });
            }

            // Handle menu actions
            function handleMenuAction(action) {
                switch (action) {
                    case 'new-game':
                        console.log('Starting new game...');
                        // Trigger game new game logic
                        break;
                    case 'load-game':
                        console.log('Loading game...');
                        if (window.electronAPI) {
                            window.electronAPI.showOpenDialog();
                        }
                        break;
                    case 'save-game':
                        console.log('Saving game...');
                        if (window.electronAPI) {
                            window.electronAPI.showSaveDialog();
                        }
                        break;
                }
            }

            // Show achievement notification
            function showAchievementNotification(achievementId) {
                const notification = document.createElement('div');
                notification.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    background: linear-gradient(135deg, #1a1a2e, #2a2a4e);
                    border: 2px solid #ff4400;
                    padding: 15px 20px;
                    border-radius: 8px;
                    box-shadow: 0 4px 20px rgba(255, 68, 0, 0.3);
                    z-index: 10000;
                    animation: slideIn 0.3s ease;
                `;
                notification.innerHTML = `
                    <div style="font-weight: bold; color: #ff4400; margin-bottom: 5px;">🏆 Achievement Unlocked!</div>
                    <div style="color: #fff;">${achievementId}</div>
                `;
                document.body.appendChild(notification);

                setTimeout(() => {
                    notification.style.animation = 'slideOut 0.3s ease';
                    setTimeout(() => notification.remove(), 300);
                }, 3000);
            }

            // Keyboard controls
            function setupControls() {
                document.addEventListener('keydown', (e) => {
                    switch(e.key) {
                        case 'F11':
                            e.preventDefault();
                            if (window.electronAPI) {
                                window.electronAPI.setFullscreen(!document.fullscreenElement);
                            }
                            break;
                        case 'Escape':
                            console.log('Escape pressed - opening menu');
                            break;
                        case 'F12':
                            // DevTools handled by Electron
                            break;
                    }
                });
            }

            // Achievement example function
            window.unlockAchievement = function(achievementId) {
                if (window.electronAPI) {
                    window.electronAPI.unlockAchievement(achievementId);
                }
            };

            // Add CSS animations
            const style = document.createElement('style');
            style.textContent = `
                @keyframes slideIn {
                    from { transform: translateX(100%); opacity: 0; }
                    to { transform: translateX(0); opacity: 1; }
                }
                @keyframes slideOut {
                    from { transform: translateX(0); opacity: 1; }
                    to { transform: translateX(100%); opacity: 0; }
                }
            `;
            document.head.appendChild(style);

        })();
    </script>
</body>
</html>
